<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyVending Start Cabinet</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <header class="hero">
        <p class="label">EasyVending Start Cabinet</p>
        <h1>Кабінет запуску обладнання</h1>

        <p class="subtitle">
            Оберіть модель обладнання для перегляду інструкцій,
            відео та матеріалів запуску.
        </p>
    </header>

    <section class="section">

        <h2>Кавове обладнання</h2>

        <div class="model-grid">

            <div class="model-card">
                <img src="assets/images/jl18.png" alt="JL18">
                <h3>Jetinno JL18</h3>
            </div>

            <div class="model-card">
                <img src="assets/images/jl22.png" alt="JL22">
                <h3>Jetinno JL22</h3>
            </div>

            <div class="model-card">
                <img src="assets/images/jl26.png" alt="JL26">
                <h3>Jetinno JL26</h3>
            </div>

            <div class="model-card">
                <img src="assets/images/jl28.png" alt="JL28">
                <h3>Jetinno JL28</h3>
            </div>

            <div class="model-card">
                <img src="assets/images/jl31.png" alt="JL31">
                <h3>Jetinno JL31A</h3>
            </div>

            <div class="model-card">
                <img src="assets/images/jl300.png" alt="JL300">
                <h3>Jetinno JL300</h3>
            </div>

        </div>

    </section>

    <section class="section">

        <h2>Торгові автомати</h2>

        <div class="model-grid">

            <div class="model-card">
                <img src="assets/images/g6.png" alt="G6">
                <h3>TCN G6 (H5)</h3>
            </div>

            <div class="model-card">
                <img src="assets/images/g8.png" alt="G8">
                <h3>TCN G8 (H5)</h3>
            </div>

            <div class="model-card">
                <img src="assets/images/g11.png" alt="G11">
                <h3>TCN G11 (V22)</h3>
            </div>

        </div>

    </section>

</div>

<script src="js/app.js"></script>

</body>
</html>
