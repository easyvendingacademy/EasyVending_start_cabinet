<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EasyVending Start Cabinet</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">

        <h1>Кабінет запуску EasyVending</h1>

        <p>
            Вітаємо! Оберіть вашу модель обладнання та отримайте
            інструкції, відео, чеклісти та підтримку.
        </p>

        <div class="cards">

            <div class="card">
                <h2>Jetinno JL550</h2>
                <p>Для локацій з високим трафіком</p>
            </div>

            <div class="card">
                <h2>Jetinno JL26</h2>
                <p>Для бізнесу та комерційних приміщень</p>
            </div>

            <div class="card">
                <h2>Jetinno JL05B</h2>
                <p>Для дому та невеликого офісу</p>
            </div>

        </div>

    </div>

    <script src="js/app.js"></script>

</body>

</html>
